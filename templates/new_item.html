{% extends 'base.html' %}
{% block content %}
<h2>יצירת פריט ציוד</h2>
<form method="post" class="card">
  <label>שם פריט <input name="name" required /></label>
  <label>מספר סיריאלי <input name="serial_number" required /></label>
  <label>סמנים/מאפיינים <textarea name="markers"></textarea></label>
  <label>שיוך לסט
    <select name="kit_id">
      <option value="">ללא סט (אקסטרא/מיוחד)</option>
      {% for kit in kits %}
      <option value="{{ kit.id }}">{{ kit.name }}</option>
      {% endfor %}
    </select>
  </label>
  <button type="submit">שמור</button>
</form>
{% endblock %}
