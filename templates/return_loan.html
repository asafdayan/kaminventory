{% extends 'base.html' %}
{% block content %}
<h2>זיכוי / החזרה</h2>
<div class="card">
  <p><strong>חותם:</strong> {{ loan.borrower_name }}</p>
  <p><strong>סט:</strong> {{ loan.kit_name or 'ללא סט' }}</p>
  <p><strong>זמן השאלה:</strong> {{ loan.signed_at }}</p>
</div>

<form method="post" class="card">
  <h3>בדיקת מצאי</h3>
  {% for item in items %}
    <div class="item-row">
      <label>
        <input type="checkbox" name="present_{{ item.loan_item_id }}" checked />
        {{ item.name }} ({{ item.serial_number }}) נמצא
      </label>
      <input type="text" name="note_{{ item.loan_item_id }}" placeholder="הערה (למשל: חסר/פגום)" />
    </div>
  {% endfor %}
  <button type="submit">סיום זיכוי</button>
</form>
{% endblock %}
