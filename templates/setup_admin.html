{% extends 'base.html' %}
{% block content %}
<h2>יצירת מנהל ראשי</h2>
<p>מסך זה זמין רק כאשר אין עדיין משתמשים במערכת.</p>
<form method="post" class="card">
  <label>שם מלא <input name="full_name" required /></label>
  <label>שם משתמש <input name="username" required /></label>
  <label>סיסמה <input name="password" type="password" required /></label>
  <button type="submit">צור מנהל ראשי</button>
</form>
{% endblock %}
